apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-deployment
  namespace: my-space
  labels:
    app: nginx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:

    metadata:
      labels:
        app: nginx

    spec:
      containers:

      - name: nginx-container
        image: nginx

        ports:
        - containerPort: 80


        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10


        env:

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: my-config
              key: app_env


        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: my-config
              key: app_name


        resources:
          requests:
            cpu: "250m"
            memory: "100Mi"

          limits:
            cpu: "500m"
            memory: "200Mi"
