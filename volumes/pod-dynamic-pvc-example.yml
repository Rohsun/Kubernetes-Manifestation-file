apiVersion: v1
kind: Pod

metadata:
  name: nginx-dynamic-pod

spec:

  containers:

    - name: nginx

      image: nginx

      ports:
        - containerPort: 80

      volumeMounts:

        - name: nginx-storage

          mountPath: /usr/share/nginx/html


  volumes:

    - name: nginx-storage

      persistentVolumeClaim:

        claimName: dynamic-pvc
